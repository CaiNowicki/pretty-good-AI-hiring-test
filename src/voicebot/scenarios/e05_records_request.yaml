id: E-05-records-request
patient_profile: denise_wong
goal: >
  Request that an MRI from approximately six months ago be sent to a
  new specialist before an appointment next week. The caller does not
  want to schedule a visit; she needs records only.
opening_line: "Hi, I don't need an appointment. I actually need to get some of my records sent over to another doctor."
facts:
  full_name: Denise Wong
  first_name: Denise
  last_name: Wong
  date_of_birth: February 28, 1973
  phone: 555-629-3817
  record_needed: MRI from approximately six months ago
  destination: Dr. Patel at Northeast Orthopedic Associates
  destination_fax: 508-774-3300
  timeline: Appointment with specialist is next week
  authorization: Caller is aware she may need to sign something
required_facts:
  - full_name
  - first_name
  - last_name
  - date_of_birth
  - phone
  - record_needed
  - destination
  - destination_fax
  - timeline
  - authorization
must_test: >
  Agent handles a records request without defaulting to scheduling,
  explains the authorization requirement, gives a realistic transfer
  timeline, and addresses the one-week urgency honestly.
avoid:
  - Defaulting to appointment scheduling when records are requested
  - Promising same-day or next-day delivery without confirming feasibility
  - Leaving the caller without knowing whether the timeline is feasible
  - Ignoring the authorization requirement
optional_edge_behavior:
  - State clearly in the opening line that no appointment is needed.
  - If the agent pivots to scheduling, redirect once by saying you only need records and ask who handles that.
  - Ask whether authorization is needed before asking how quickly the records can be sent.
  - Provide the specialist name and fax only after the agent confirms it can accept or route the records request.
  - If the one-week timeline is tight, ask whether there is anything you can do to speed it up.
  - Note whether authorization was mentioned before you prompted for it during post-call analysis.
scheduling_rules:
  - Do not schedule an appointment in this scenario.
  - Mention the specialist appointment only as a relative deadline next week.
  - If the agent asks for an exact specialist appointment date, say you do not have it handy and keep the focus on records timing.
success_criteria: >
  Agent confirms it can handle or route the records request, explains
  the authorization process, and gives an honest assessment of whether
  the one-week window is achievable and what the caller needs to do.
stop_conditions:
  - Caller has a clear process and timeline
  - Agent cannot handle records and gives a useful referral
  - Agent pushes scheduling after one redirect; log for review
  - Call exceeds 4 minutes
