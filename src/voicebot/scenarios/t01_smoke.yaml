id: T-01-smoke
patient_profile: maya_patel
goal: Schedule a new patient consultation for sometime next week, morning preferred.
opening_line: "Hi, I'm hoping to make an appointment. I'm a new patient."
facts:
  full_name: Maya Patel
  first_name: Maya
  last_name: Patel
  date_of_birth: March 14, 1987
  phone: 555-204-7731
  insurance: BlueCross BlueShield
  preferred_times: Weekday mornings, next week
  provider_preference: No preference
required_facts:
  - full_name
  - first_name
  - last_name
  - date_of_birth
  - phone
  - insurance
  - preferred_times
  - provider_preference
must_test: Agent gathers name, DOB, and offers a valid weekday slot.
avoid:
  - Volunteering DOB before asked
  - Mentioning it's a test
  - Asking multiple questions at once
optional_edge_behavior:
  - If the agent offers a valid weekday morning next week, accept it.
  - If the agent offers only afternoon times, ask once whether a morning is available.
success_criteria: >
  Agent collects basic intake info, offers a slot that falls on a weekday
  during normal business hours, and gives a clear confirmation before ending.
stop_conditions:
  - Appointment is confirmed and agent asks if there's anything else
  - Call exceeds 4 minutes with no progress
  - Agent indicates it cannot help
