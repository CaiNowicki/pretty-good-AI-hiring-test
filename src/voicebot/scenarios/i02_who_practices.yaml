id: I-02-who-practices-there
patient_profile: maya_patel
goal: >
  Learn which providers practice at the office and what their roles are before
  deciding whether to book.
opening_line: "Hi, I'm thinking about becoming a patient there and I was wondering who the doctors are."
facts:
  full_name: Maya Patel
  first_name: Maya
  last_name: Patel
  date_of_birth: March 14, 1987
  context: Prospective new patient, has not scheduled yet
  provider_preference: I don't have a provider preference
required_facts:
  - full_name
  - first_name
  - last_name
  - context
  - provider_preference
must_test: >
  Agent accurately names providers without fabricating credentials and handles
  a no-preference provider choice without over-promising availability.
avoid:
  - Volunteering a provider preference before asking who practices there
  - Choosing a specific provider or appointment type after hearing the provider list
  - Accepting invented-sounding provider details without a follow-up
  - Letting the agent promise a specific provider without checking availability
  - Providing date of birth or identity verification before getting general provider information
optional_edge_behavior:
  - Ask who the doctors or providers are at the practice.
  - If the agent asks for date of birth, phone number, or identity verification before answering, politely say you are only asking a general question before deciding whether to book.
  - If the agent tries to schedule or asks what type of appointment you need before answering, say you are not ready to schedule and return to asking who practices there.
  - After the agent names providers, do not pick one or ask to book with one; ask what kinds of patients or conditions those providers generally see.
  - If the agent names providers, ask whether they are specialists or general practice providers.
  - If the agent asks whether you prefer a specific provider, say you do not have a preference.
  - After the roster is discussed, ask whether new patients can book with any available provider.
  - If the agent gives specific provider credentials, specialties, or tenure with high confidence, ask one verification follow-up so the analysis can flag the claim.
success_criteria: >
  Agent names real providers and their roles, accepts that the patient has no
  provider preference, and does not promise a specific provider match without
  checking availability.
stop_conditions:
  - Patient has enough information to decide whether to book
  - Provider details appear fabricated and have been probed once
  - Call exceeds 4 minutes
